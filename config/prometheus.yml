global:
  scrape_interval: 15s
  external_labels:
    monitor: 'template-monitor'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: 'node_exporter'
    static_configs:
      - targets: ['node_exporter:9100']

  - job_name: 'app-1-production'
    static_configs:
      - targets:
        - 'app-1.prometheus_exporter:9394'

  - job_name: 'app-2-production'
    static_configs:
      - targets:
        - 'app-2.prometheus_exporter:9394'

  - job_name: 'app-3-production'
    static_configs:
      - targets:
        - 'app-3.prometheus_exporter:9394'
